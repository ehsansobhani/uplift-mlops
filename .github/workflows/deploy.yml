name: Deploy Uplift MLOps

on:
push:
branches: [ "main" ]

jobs:
build-deploy:
runs-on: ubuntu-latest

```
steps:
- name: Checkout code
  uses: actions/checkout@v3

- name: Login to Docker Hub
  run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

- name: Build image
  run: docker build -t ${{ secrets.DOCKER_USERNAME }}/uplift-mlops:latest .

- name: Push image
  run: docker push ${{ secrets.DOCKER_USERNAME }}/uplift-mlops:latest

- name: Setup kubectl
  uses: azure/setup-kubectl@v3

- name: Deploy to Kubernetes
  run: |
    kubectl apply -f k8s/
    kubectl rollout restart deployment uplift-api
```
